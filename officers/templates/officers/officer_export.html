
{% extends 'officers/base.html' %}
{% block title %}सभी एंट्री{% endblock %}

{% block content %}
<div class="container mt-4">

    <h3>📤 Entries Export Karo (CSV / Excel)</h3>

    <div class="card p-4">

        <p class="text-muted">
            Apni officer entries ko CSV ya Excel format mein export kijiye.
        </p>

        <div class="d-flex gap-2 flex-wrap">
            <a href="{% url 'officer_export_csv' %}"class="btn btn-success"><i class="bi bi-filetype-csv"></i>Export CSV</a>
            <a href="{% url 'officer_export_excel' %}"class="btn btn-primary"><i class="bi bi-file-earmark-excel"></i>Export Excel</a>
            <a href="{% url 'officer_list' %}"class="btn btn-dark"><i class="bi bi-arrow-left"></i>Sabhi Entries Dekho</a>
        </div>

    </div>

</div>

{% endblock %}
