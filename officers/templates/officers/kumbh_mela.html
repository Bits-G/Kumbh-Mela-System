{% extends 'officers/base.html' %}
{% block title %}Kumbh Mela Dashboard{% endblock %}
{% block content %}
<div class="text-center mb-4">
    <h2>🕉️ Kumbh Mela — Officer Directory System</h2>
    <p class="text-muted">कुल एंट्री: <strong>{{ total_officers }}</strong></p>
</div>

<div class="row g-4">
    <div class="col-md-4">
        <div class="card p-4 text-center">
            <i class="bi bi-person-plus-fill fs-1 text-danger"></i>
            <h5 class="mt-2">नई एंट्री जोड़ें</h5>
            <a href="{% url 'officer_add' %}" class="btn btn-danger mt-2">Add Entry</a>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-4 text-center">
            <i class="bi bi-list-ul fs-1 text-primary"></i>
            <h5 class="mt-2">सभी एंट्री देखें</h5>
            <a href="{% url 'officer_list' %}" class="btn btn-primary mt-2">View All</a>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-4 text-center">
            <i class="bi bi-search fs-1 text-success"></i>
            <h5 class="mt-2">खोजें (Search)</h5>
            <a href="{% url 'search_officers' %}" class="btn btn-success mt-2">Search</a>
        </div>
    </div>
</div>
{% endblock %}
